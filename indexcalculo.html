<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Henrique Nunes Executivo - Orçamento</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Montserrat', sans-serif; background:#0F1216; margin:0; padding:20px; color: #fff; }
    .container {
      max-width:1100px; margin:auto; background:#1a1e24; padding:20px;
      border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,.5); border: 1px solid #2d343d;
    }
    .titulo { text-align:center; font-size:40px; margin:0 0 6px 0; font-weight:900; text-decoration: underline; text-transform: uppercase; }
    .titulo .vermelho { color:#1F497D; }
    .logo { text-align:center; margin-bottom: 20px; }
    .logo img { display:block; margin:0 auto; max-width:260px; width:100%; height:auto; }
    h2 { text-align:center; margin:10px 0 25px 0; font-weight: 400; color: #A0AEC0; }
    .linha { display:flex; gap:10px; flex-wrap:wrap; }
    input { flex:1; min-width:260px; padding:15px; font-size:16px; border:1px solid #2d343d; border-radius:8px; background: #090b0d; color: #fff; }
    .botoes { display:flex; gap:12px; justify-content:center; align-items:center; flex-wrap:wrap; margin-top:15px; }
    .botoes button { flex: 0 1 220px; padding:15px; font-size:15px; border:none; border-radius:10px; color:#fff; cursor:pointer; font-weight: 800; text-transform: uppercase; }
    .btn-azul { background:#1F497D; }
    .btn-verde { background:#2d343d; border: 1px solid #444; } 
    .btn-wpp { background:#25D366; }
    #resultado { margin-top:20px; padding:18px; background: #090b0d; border-radius:12px; border: 1px solid #1F497D; color: #fff; line-height: 1.8; }
    #map { margin-top:20px; height:450px; border-radius:15px; border: 1px solid #2d343d; }
    footer { margin-top:30px; text-align:center; color: #666; }
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); justify-content:center; align-items:center; padding:16px; z-index: 2000; }
    .modal-content { background: #1a1e24; width:100%; max-width:420px; border-radius:15px; padding:25px; border: 1px solid #1F497D; }
  </style>
</head>

<body>
  <div class="container">
    <div class="titulo">Henrique Nunes <span class="vermelho">Executivo</span></div>
    <div class="logo">
      <img src="../Henrique nunes/logotipo-hn.png" alt="Henrique Nunes" />
    </div>

    <h2>Simulador de Rota e Orçamento Premium</h2>

    <div class="linha">
      <input id="origem" placeholder="Local de embarque" />
      <input id="destino" placeholder="Local de destino" />
    </div>

    <div class="botoes">
      <button class="btn-verde" id="btnLocalizacao">📍 Usar GPS</button>
      <button class="btn-verde" id="btnInverter">🔁 Inverter</button>
      <button class="btn-wpp" id="btnWhats">💬 WhatsApp</button>
    </div>

    <div class="botoes" style="margin-top:30px;">
      <button class="btn-azul" id="btnCalcular" style="max-width:400px; flex:1; font-size:18px;">Gerar Orçamento</button>
    </div>

    <div id="resultado">Informe os endereços e clique em Gerar Orçamento.</div>
    <div id="map"></div>

    <footer>Desenvolvido por <b>Braztec</b> | Contato: <b>27 99836-1919</b></footer>
  </div>

  <div class="modal" id="modalNome">
    <div class="modal-content">
      <h3>Confirme seu Nome</h3>
      <input type="text" id="nomeCliente" placeholder="Seu nome" style="width:100%; margin-top:10px;" />
      <div class="botoes" style="margin-top:20px;">
        <button class="btn-verde" id="btnCancelar" style="background:#344054">Voltar</button>
        <button class="btn-azul" id="btnEnviar">Enviar WhatsApp</button>
      </div>
    </div>
  </div>

  <script>
    let map, directionsService, directionsRenderer, geocoder;
    
    // CONFIGURAÇÕES DE PREÇO
    let TARIFA_BASE = 180.00;
    let VALOR_POR_KM = 5.00;
    const ADICIONAL_NOTURNO = 50.00;
    const HORA_INICIO_NOTURNO = 22;
    const HORA_FIM_NOTURNO = 6;
    const WHATSAPP_NUMERO = "5527988342615";

    let ultimoResumo = null, ultimaLocalizacao = null, ultimoSnapshot = null;
    let acOrigem = null, acDestino = null, acOrigemIniciado = false, acDestinoIniciado = false;

    function brl(v) { return v.toLocaleString("pt-BR", { style: "currency", currency: "BRL" }); }
    function setResultado(html) { document.getElementById("resultado").innerHTML = html; }
    function emHorarioNoturno() { const h = new Date().getHours(); return (h >= HORA_INICIO_NOTURNO) || (h < HORA_FIM_NOTURNO); }

    function initAutocomplete() {
      const opts = { types: ["geocode"], componentRestrictions: { country: "br" } };
      const oInput = document.getElementById("origem"), dInput = document.getElementById("destino");
      oInput.addEventListener("input", () => { if (!acOrigemIniciado && oInput.value.length >= 3) { acOrigem = new google.maps.places.Autocomplete(oInput, opts); acOrigemIniciado = true; } });
      dInput.addEventListener("input", () => { if (!acDestinoIniciado && dInput.value.length >= 3) { acDestino = new google.maps.places.Autocomplete(dInput, opts); acDestinoIniciado = true; } });
    }

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), { center: { lat: -20.3155, lng: -40.3128 }, zoom: 12 });
      directionsService = new google.maps.DirectionsService();
      directionsRenderer = new google.maps.DirectionsRenderer({ map });
      geocoder = new google.maps.Geocoder();
      initAutocomplete();

      document.getElementById("btnLocalizacao").addEventListener("click", usarMinhaLocalizacao);
      document.getElementById("btnInverter").addEventListener("click", () => {
        const o = document.getElementById("origem"), d = document.getElementById("destino");
        [o.value, d.value] = [d.value, o.value]; ultimoResumo = null;
      });
      document.getElementById("btnCalcular").addEventListener("click", () => calcularRota());
      document.getElementById("btnWhats").addEventListener("click", () => {
        if (!ultimoResumo || mudouEndereco()) calcularRota(true); else abrirModal();
      });
      document.getElementById("btnCancelar").addEventListener("click", () => document.getElementById("modalNome").style.display="none");
      document.getElementById("btnEnviar").addEventListener("click", enviarWhats);
    }

    function mudouEndereco() {
      const o = document.getElementById("origem").value, d = document.getElementById("destino").value;
      return !ultimoSnapshot || o !== ultimoSnapshot.o || d !== ultimoSnapshot.d;
    }

    function usarMinhaLocalizacao() {
      if (!navigator.geolocation) return alert("GPS não suportado.");
      navigator.geolocation.getCurrentPosition(pos => {
        const latlng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        geocoder.geocode({ location: latlng }, (results, status) => {
          if (status === "OK") document.getElementById("origem").value = results[0].formatted_address;
        });
      });
    }

    function calcularRota(abrirModalDepois = false) {
      const o = document.getElementById("origem").value, d = document.getElementById("destino").value;
      if (!o || !d) return alert("Preencha origem e destino.");

      directionsService.route({ origin: o, destination: d, travelMode: 'DRIVING' }, (res, status) => {
        if (status === "OK") {
          directionsRenderer.setDirections(res);
          const rota = res.routes[0].legs[0];
          const km = rota.distance.value / 1000;
          const adicional = emHorarioNoturno() ? ADICIONAL_NOTURNO : 0;
          const total = TARIFA_BASE + (km * VALOR_POR_KM) + adicional;

          ultimoResumo = { o: rota.start_address, d: rota.end_address, dist: rota.distance.text, tempo: rota.duration.text, preco: brl(total) };
          ultimoSnapshot = { o: document.getElementById("origem").value, d: document.getElementById("destino").value };
          
          setResultado(`<b>Distância:</b> ${rota.distance.text} | <b>Valor Estimado:</b> ${brl(total)}`);
          if (abrirModalDepois) abrirModal();
        } else {
          alert("Erro ao calcular rota.");
        }
      });
    }

    function abrirModal() { document.getElementById("modalNome").style.display="flex"; }

    function enviarWhats() {
      const nome = document.getElementById("nomeCliente").value;
      if (!nome) return alert("Digite seu nome.");
      let msg = `Olá, me chamo ${nome}.\nOrçamento de Transporte:\nDe: ${ultimoResumo.o}\nPara: ${ultimoResumo.d}\nDistância: ${ultimoResumo.dist}\nValor: ${ultimoResumo.preco}`;
      window.open(`https://wa.me/${WHATSAPP_NUMERO}?text=${encodeURIComponent(msg)}`, "_blank");
    }
  </script>
  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCCCNAa-Zu-wK5Bov5P1rNYgubIhrICYaM&libraries=places&callback=initMap"></script>
</body>
</html>
